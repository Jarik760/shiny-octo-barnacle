<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Квест — Telegram Mini App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <div class="card" id="game-card" role="main" aria-live="polite">
      <div id="scene-text" class="scene-text">Загрузка...</div>
      <div id="choices" class="choices" aria-label="Варианты"></div>
      <div class="footer">
        <button id="restartBtn" class="btn secondary">Перезапустить</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
